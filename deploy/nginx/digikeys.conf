server {
    listen 80;
    server_name carte.consulaire.bf;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name carte.consulaire.bf;

    ssl_certificate /etc/letsencrypt/live/carte.consulaire.bf/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carte.consulaire.bf/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval';" always;

    # Rate limiting for verification API
    limit_req_zone $binary_remote_addr zone=verify:10m rate=30r/m;

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large uploads for biometric data
        client_max_body_size 20M;
    }

    location /api/v1/verify/ {
        limit_req zone=verify burst=5;
        proxy_pass http://127.0.0.1:8081;
    }

    location /health {
        proxy_pass http://127.0.0.1:8081;
    }

    # Frontend
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
}
