# Local development only
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: digikeys-postgres-dev
    environment:
      POSTGRES_DB: digikeys
      POSTGRES_USER: digikeys
      POSTGRES_PASSWORD: digikeys_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: digikeys-minio-dev
    environment:
      MINIO_ROOT_USER: digikeys
      MINIO_ROOT_PASSWORD: digikeys_dev_password
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres-data:
  minio-data:
